<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蔚蓝档案 - 记忆大厅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #ffffff; /* 全屏纯白背景 */
            overflow: hidden;
            font-family: "Microsoft YaHei", sans-serif;
        }

        /* 轮播容器 */
        .carousel {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* 加载状态布局 */
        .loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        /* 左上角小图标 ft.png */
        .loading-icon {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 80px; /* 小尺寸 */
            height: auto;
        }

        /* 加载文字 */
        .loading-text {
            font-size: 22px;
            color: #333;
        }

        /* 图片默认隐藏 */
        .carousel img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            cursor: pointer;
            z-index: 1;
        }

        /* 加载完成后显示轮播 */
        .carousel.ready .loading {
            display: none;
        }
        .carousel.ready img {
            animation: fade 21s infinite ease-in-out;
        }

        /* 平滑淡入淡出动画 */
        @keyframes fade {
            0%  { opacity: 0; }
            8%  { opacity: 1; }
            33% { opacity: 1; }
            41% { opacity: 0; }
            100%{ opacity: 0; }
        }

        /* 轮播延时 */
        .carousel img:nth-child(1) { animation-delay: 0s; }
        .carousel img:nth-child(2) { animation-delay: 7s; }
        .carousel img:nth-child(3) { animation-delay: 14s; }

        /* 鼠标悬停暂停 */
        .carousel.ready:hover img {
            animation-play-state: paused;
        }
    </style>
</head>

<body>
    <div class="carousel">
        <!-- 加载界面 -->
        <div class="loading">
            <img src="img/ft.png" class="loading-icon" alt="logo">
            <div class="loading-text">正在加载图像中，请稍后</div>
        </div>

        <!-- 轮播图片 -->
        <img src="img/1.jpeg" alt="">
        <img src="img/2.jpeg" alt="">
        <img src="img/3.jpeg" alt="">
    </div>

    <script>
        const carousel = document.querySelector('.carousel');
        const imgs = document.querySelectorAll('.carousel img:not(.loading-icon)');
        let loaded = 0;

        imgs.forEach(img => {
            img.onload = function() {
                loaded++;
                // 全部加载完成 → 开始轮播
                if (loaded === imgs.length) {
                    carousel.classList.add('ready');
                }
            };
        });
    </script>
</body>
</html>

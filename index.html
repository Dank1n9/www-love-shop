<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蔚蓝档案 - 记忆大厅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #0a0a1a;
            overflow: hidden;
        }

        /* 轮播全屏容器 */
        .carousel {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* 加载占位图：默认显示 ft.png */
        .carousel::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("img/ft.png") center/cover no-repeat;
            z-index: -1;
        }

        /* 图片样式 */
        .carousel img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            animation: fade 21s infinite ease-in-out;
            cursor: pointer;
        }

        /* 平滑淡入淡出动画 */
        @keyframes fade {
            0%  { opacity: 0; }
            8%  { opacity: 1; }
            33% { opacity: 1; }
            41% { opacity: 0; }
            100%{ opacity: 0; }
        }

        /* 轮播延时：每张间隔 7s */
        .carousel img:nth-child(1) { animation-delay: 0s;  }
        .carousel img:nth-child(2) { animation-delay: 7s;  }
        .carousel img:nth-child(3) { animation-delay: 14s; }

        /* 悬停暂停：可手动打断轮播 */
        .carousel:hover img {
            animation-play-state: paused;
        }
        .carousel:not(:hover) img {
            animation-play-state: running;
        }
    </style>
</head>

<body>
    <div class="carousel">
        <img src="img/1.jpeg" alt="">
        <img src="img/2.jpeg" alt="">
        <img src="img/3.jpeg" alt="">
    </div>
</body>
</html>

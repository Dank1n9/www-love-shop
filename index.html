<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蔚蓝档案 - 记忆大厅</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #ffffff;
            overflow: hidden;
            font-family: "Microsoft YaHei", sans-serif;
        }

        .carousel {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* 加载层：全屏纯白 */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 左上角小 ft.png */
        .loading-logo {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 90px;
            height: auto;
            z-index: 99999;
        }

        /* 加载文字 */
        .loading-tip {
            font-size: 24px;
            color: #333;
        }

        /* 轮播图片 */
        .carousel img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            z-index: 1;
        }

        /* 加载完成 → 隐藏加载界面 */
        .carousel.ready .loading {
            display: none;
        }

        .carousel.ready img {
            animation: fade 21s infinite ease-in-out;
            cursor: pointer;
        }

        @keyframes fade {
            0%  { opacity: 0; }
            8%  { opacity: 1; }
            33% { opacity: 1; }
            41% { opacity: 0; }
            100%{ opacity: 0; }
        }

        .carousel img:nth-child(2) { animation-delay: 7s; }
        .carousel img:nth-child(3) { animation-delay: 14s; }

        /* 悬停暂停 */
        .carousel.ready:hover img {
            animation-play-state: paused;
        }
    </style>
</head>

<body>
    <div class="carousel">
        <!-- 加载界面：左上角 ft.png + 中间文字 -->
        <div class="loading">
            <img src="img/ft.png" class="loading-logo" alt="logo">
            <div class="loading-tip">正在加载图像中，请稍后</div>
        </div>

        <!-- 轮播图片 -->
        <img src="img/1.jpeg" alt="">
        <img src="img/2.jpeg" alt="">
        <img src="img/3.jpeg" alt="">
    </div>

    <script>
        const carousel = document.querySelector('.carousel');
        const images = document.querySelectorAll('.carousel img:not(.loading-logo)');
        let count = 0;

        images.forEach(img => {
            img.onload = () => {
                count++;
                if (count === images.length) {
                    carousel.classList.add('ready');
                }
            };
        });
    </script>
</body>
</html>
